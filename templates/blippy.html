<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ask Blippy</title>
    <style>
        body {
            margin: 0;
            font-family: "Comic Sans MS", cursive, sans-serif;
            background: url('static/images/sonic_background.png') no-repeat center center fixed;
            background-size: cover;
            text-align: center;
        }

        h1 {
            color: rgb(221, 221, 14);
            font-size: 64px;
            text-shadow: 3px 3px black;
            margin-top: 40px;
        }

        .chat-area {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 40px;
            gap: 20px;
        }

        .blippy {
            width: 180px;
        }

        .input-section {
            width: 600px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 15px;
            border: 3px solid #ffcc00;
            padding: 10px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            background: #ff6600;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #ff3300;
        }

        .response {
            margin-top: 15px;
            padding: 15px;
            background: #e6ffe6;
            border-radius: 15px;
            border: 3px dashed #66cc66;
            min-height: 50px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Ask Blippy</h1>

    <div class="chat-area">
        <img src="static/images/blippy_transparent.png" class="blippy" alt="Blippy">

        <div class="input-section">
            <textarea id="question" placeholder="Ask Blippy anything - he's here to help!"></textarea>
            <br>
            <button onclick="sendQuestion()">Ask Blippy!</button>

            <div class="response" id="response"></div>
        </div>
    </div>

    <script>
        async function pollForAnswer(blippycode, interval = 1000, timeout = 30000) {
            const start = Date.now();

            while (true) {
                try {
                const response = await fetch("", {
                    method: "POST",
                    headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    },
                    body: new URLSearchParams({
                    BLIPPYCODE: blippycode,
                    }),
                });

                const text = await response.text();

                if (text.startsWith("ANSWER")) {
                    const cleaned = text.slice("ANSWER".length);
                    document.getElementById("response").textContent = cleaned;
                    return;
                }

                if (Date.now() - start > timeout) {
                    throw new Error("Timed out waiting for ANSWER");
                }

                // wait before trying again
                await new Promise((res) => setTimeout(res, interval));
                } catch (err) {
                console.error("Polling error:", err);
                throw err;
                }
            }
        }

        function sendQuestion() {
            const questionBox = document.getElementById("question");
            const responseBox = document.getElementById("response");
            const question = questionBox.value.trim();

            if (!question) return;

            responseBox.innerText = "Blippy is thinking...";

            fetch("", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "question=" + encodeURIComponent(question)
            })
            .then(response => response.text())
            .then(data => {

                // Reset for new question
                questionBox.value = "";
                questionBox.placeholder = question;

                console.log(data)

                if (data.startsWith("BLIPPYCODE:")) {
                    //  We extract the code then poll the server until an answer 
                    //  arrives
                    let blippycode = data.substring(11)
                    pollForAnswer(blippycode)
                }
                else{
                    responseBox.innerText = data;
                }

            })
            .catch(error => {
                responseBox.innerText = "Oops! Something went wrong.";
                console.error(error);
            });
        }
    </script>

</body>
</html>
